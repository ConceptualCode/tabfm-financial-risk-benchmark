# FinBench (yuweiyin/FinBench) task configs.
# All tasks are binary classification (num_classes = 2), so TabFM's
# 10-class ceiling is a non-issue for this benchmark.

datasets:
  - config: cd1
    risk_type: credit_default
    display_name: "Credit-card Default 1"
  - config: cd2
    risk_type: credit_default
    display_name: "Credit-card Default 2"
  - config: ld1
    risk_type: loan_default
    display_name: "Loan Default 1"
  - config: ld2
    risk_type: loan_default
    display_name: "Loan Default 2"
  - config: ld3
    risk_type: loan_default
    display_name: "Loan Default 3"
  - config: cf1
    risk_type: credit_fraud
    display_name: "Credit-card Fraud 1"
  - config: cf2
    risk_type: credit_fraud
    display_name: "Credit-card Fraud 2"
  - config: cc1
    risk_type: customer_churn
    display_name: "Customer Churn 1"
  - config: cc2
    risk_type: customer_churn
    display_name: "Customer Churn 2"
  - config: cc3
    risk_type: customer_churn
    display_name: "Customer Churn 3"

models:
  - tabfm
  - sap_rpt
  - xgboost
  - lightgbm
  - logreg
